[build]
  command = "echo 'Static site - no build required'"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# SPA fallback - redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy - uncomment and configure when backend is deployed
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-backend.railway.app/api/:splat"
#   status = 200
#   force = true
